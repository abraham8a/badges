<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito TX-20 - Próxima Asamblea</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f4f8;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: 550px;
        }
        h1 {
            color: #1a4a7a;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #e1e8ed;
            padding-bottom: 1rem;
        }
        p {
            line-height: 1.6;
            font-size: 1.1rem;
            margin: 1rem 0;
        }
        #countdown {
            display: flex;
            justify-content: space-around;
            margin: 2rem 0;
            font-weight: bold;
        }
        .time-box {
            background: #1a4a7a;
            color: white;
            padding: 10px;
            border-radius: 8px;
            width: 70px;
        }
        .time-box span {
            display: block;
            font-size: 1.5rem;
        }
        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .footer {
            font-weight: bold;
            color: #5d6d7e;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Aviso - TX-20</h1>
        <p>Esta página es para uso exclusivo del circuito TX-20.</p>
        <p>Si desea acceso, favor de contactar a su superintendente de circuito.</p>
        
        <div id="countdown">
            <div class="time-box"><span id="days">00</span><div class="label">Días</div></div>
            <div class="time-box"><span id="hours">00</span><div class="label">Hrs</div></div>
            <div class="time-box"><span id="minutes">00</span><div class="label">Min</div></div>
            <div class="time-box"><span id="seconds">00</span><div class="label">Seg</div></div>
        </div>

        <div class="footer">
            Esta página regresará en su próxima asamblea: <br><strong>12 - 14 de junio de 2026</strong>
        </div>
    </div>

    <script>
        const targetDate = new Date("June 12, 2026 00:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "<h3>¡Bienvenidos a la Asamblea!</h3>";
            }
        }, 1000);
    </script>
</body>
</html>
